spring:
  application:
    name: crmai

  datasource:
    url: jdbc:postgresql://localhost:5432/platform_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PlatformPool
      maximum-pool-size: 5

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

  flyway:
    enabled: false

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    com.keshava.crmai: DEBUG
